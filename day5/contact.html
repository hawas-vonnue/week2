    <main>
      <div class="contact-form">
        <h1>Contact</h1>
        <form>
          <fieldset>
            <legend>Contact Form</legend>
            <div class="field">
              <input type="text" id="name" placeholder="Name" required />
              <label for="name">Name:*</label>
            </div>
            <div class="field">
              <input type="email" id="email" placeholder="Email" required />
              <label for="email">Email:*</label>
            </div>
            <div class="field">
              <input type="tel" id="phone" placeholder="phone" />
              <label for="phone">Phone:</label>
            </div>
            <div class="select-field">
              <label for="select">Department:</label>
              <select name="department" id="select">
                <option value="">choose a department</option>
                <option value="Design">Design</option>
                <option value="Developer">Developer</option>
                <option value="QA">QA</option>
              </select>
            </div>
            <div class="field">
              <textarea id="message" placeholder="message" required></textarea>
              <label for="message">Message:*</label>
            </div>
            <div class="checkbox-field">
              <input type="checkbox" id="newsLetter" />
              <label for="newsLetter">Send news letter</label>
            </div>
            <input type="submit" />
          </fieldset>
        </form>
      </div>
      <div class="location">
        <h2>Location</h2>
        <iframe
          title="Location of Company"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3907.476957585935!2d76.23974257505509!3d11.66057178854709!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba6097295a1d8ad%3A0xb302b72edc08e0db!2sVonnue%20Innovations%20Pvt.%20Ltd.!5e0!3m2!1sen!2sin!4v1780989264902!5m2!1sen!2sin"

        ></iframe>
        <address>2nd Floor Key Tee Tower, Sultan Bathery, Kerala, India-673592</address>
      </div>
