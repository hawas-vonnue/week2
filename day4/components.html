<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>CSS only interactive Components</title>
    <link rel="stylesheet" href="components.css" />
  </head>
  <body>
    <main>
      <h1>CSS only interactive Components</h1>
      <h2>CSS only accordion</h2>
      <div class="accordion">
        <label for="checkbox">> Click here</label>
        <input type="checkbox" id="checkbox" />
        <div class="content">this is content.</div>
      </div>
      <h2>Tab component</h2>
      <div class="tabs">
        <label for="tab1" id="label1">Tab 1</label>
        <input type="radio" name="tab" id="tab1" />
        <div class="tab1Content">This is tab 1 content</div>
        <label for="tab2" id="label2">Tab 2</label>
        <input type="radio" name="tab" id="tab2" />
        <div class="tab2Content">This is tab 2 content</div>
      </div>
      <h2>Star rating</h2>
      <div class="rating">
        <input type="radio" name="rate" id="star1" />
        <label for="star1" id="label3"></label>
        <input type="radio" name="rate" id="star2" />
        <label for="star2" id="label4"></label>
        <input type="radio" name="rate" id="star3" />
        <label for="star3" id="label5"></label>
        <input type="radio" name="rate" id="star4" />
        <label for="star4" id="label6"></label>
        <input type="radio" name="rate" id="star5" />
        <label for="star5" id="label7"></label>
      </div>
    </main>
  </body>
</html>
